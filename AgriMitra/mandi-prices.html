            const t = translations[lang];
            const nameMap = {
                cropWheat: t.cropWheat,
                cropRice: t.cropRice,
                cropTomato: t.cropTomato,
                cropPotato: t.cropPotato,
                cropOnion: t.cropOnion,
                cropBrinjal: t.cropBrinjal
            };
            return nameMap[cropKey] || cropKey;
        }

        // Get unit from translation

            return translations[lang].unitQuintal;
        }

        // AI Prediction function
        function getMandiPrediction(currentPrice, trend, lang) {
            const t = translations[lang];
            let predictedPrice = currentPrice;
            let sentiment = "";
            let confidence = "";
            let trendClass = "";
            
            if(trend === "up") {
                predictedPrice = currentPrice * 1.05;
                sentiment = t.sentimentUp;
                confidence = t.confidenceMedium;
                trendClass = "trend-up";
            } else if(trend === "down") {
                predictedPrice = currentPrice * 0.97;
                sentiment = t.sentimentDown;
                confidence = t.confidenceLow;
                trendClass = "trend-down";
            } else {
                predictedPrice = currentPrice * 1.01;
                sentiment = t.sentimentStable;
                confidence = t.confidenceHigh;
                trendClass = "trend-stable";
            }
            
            return {
                price: Math.round(predictedPrice),
                sentiment: sentiment,
                confidence: confidence,
                trendClass: trendClass
            };
        }

            const t = translations[lang];
            if(trend === "up") return t.bestTimeWait;
            if(trend === "down") return t.bestTimeSellNow;

            const t = translations[currentLang];
            container.innerHTML = '';
            
            for(let [key, crop] of Object.entries(mandiCropsData)) {
                const cropData = cropPrices[key];
                const cropName = getCropName(crop.cropKey, currentLang);
                const unit = getUnit(currentLang);
                const prediction = getMandiPrediction(cropData.price, cropData.trend, currentLang);
                const bestTime = getMandiBestTime(cropData.trend, currentLang);
                
                const card = `
                    <div class="price-card">
                        <h3>${crop.emoji} ${cropName}</h3>
                        <div class="price">
                            ₹${cropData.price}/<small>${unit}</small>
                        </div>
                        <div class="prediction">
                            <strong>${t.predictionLabel}</strong>
                            <div class="prediction-price">₹${prediction.price}/${unit}</div>
                            <div class="sentiment ${prediction.trendClass}">${prediction.sentiment}</div>
                            <div class="confidence">${prediction.confidence}</div>
                        </div>
                        <div class="best-time">
                            ${bestTime}
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            }
        }

        // Update all text on page
        function updatePageLanguage(lang) {
            const t = translations[lang];
            if (!t) return;
            
            document.getElementById('backBtnText').innerText = t.backBtnText;
            document.getElementById('pageTitle').innerText = t.pageTitle;
            document.getElementById('subtitleText').innerHTML = `<i class="fas fa-rupee-sign"></i> ${t.subtitleText}`;
            document.getElementById('refreshBtn').innerHTML = `<i class="fas fa-sync-alt"></i> ${t.refreshBtn}`;
            
            // Refresh the displayed prices with new language
            displayMandiPrices();
        }

        // Refresh prices with new random values
        function refreshMandiPrices() {
            const btn = document.getElementById('refreshBtn');
            const t = translations[currentLang];
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${t.refreshing}`;
            btn.disabled = true;
            
            setTimeout(() => {
                for(let key in cropPrices) {
                    // Random price change between -80 to +80
                    let change = (Math.random() - 0.5) * 160;
                    let newPrice = cropPrices[key].price + change;
                    
                    // Keep price between 500 and 5000
                    newPrice = Math.max(500, Math.min(5000, newPrice));
                    cropPrices[key].price = Math.round(newPrice);
                    
                    // Update trend based on price movement
                    if(change > 20) {
                        cropPrices[key].trend = "up";
                    } else if(change < -20) {
                        cropPrices[key].trend = "down";
                    } else {
                        cropPrices[key].trend = "stable";
                    }
                }
                
                displayMandiPrices();
                
                btn.innerHTML = `<i class="fas fa-check"></i> ${t.updated}`;
                btn.disabled = false;
                
                setTimeout(() => {
                    btn.innerHTML = `<i class="fas fa-sync-alt"></i> ${t.refreshBtn}`;
                }, 2000);
            }, 600);
        }

        // Go back to home page
        function goBack() {
            window.location.href = 'home.html';
        }

        // Change language
        function changeLanguage(lang) {
            currentLang = lang;
            updatePageLanguage(lang);
            localStorage.setItem('agriMitraLang', lang);
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            const langSelect = document.getElementById('languageSelect');
            const savedLang = localStorage.getItem('agriMitraLang') || 'en';
            currentLang = savedLang;
            langSelect.value = savedLang;
            
            updatePageLanguage(savedLang);
            
            langSelect.addEventListener('change', function(e) {
                changeLanguage(e.target.value);
            });
        });
        
        // Auto-refresh every 30 seconds (optional)
        let autoRefreshInterval;
        
        function startAutoRefresh() {
            autoRefreshInterval = setInterval(() => {
                refreshMandiPrices();
            }, 30000);
        }
        
        function stopAutoRefresh() {
            if(autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        }
        
        // Start auto-refresh
        startAutoRefresh();
        
        // Clean up interval when page closes
        window.addEventListener('beforeunload', () => {
            stopAutoRefresh();
        });
    </script>
</body>
</html>
