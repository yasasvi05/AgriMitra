<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriBot - Your Farming Assistant</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chatbot.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .back-button-container {
            max-width: 800px;
            margin: 20px auto 0;
            padding: 0 20px;
        }

        .back-to-home {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: white;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
        }

        .back-to-home:hover {
            transform: translateX(-5px);
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }

        .chatbot-wrapper {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding-bottom: 20px;
        }

        .chatbot-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .language-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .lang-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .lang-btn:hover {
            transform: scale(1.05);
        }

        .lang-change-btn {
            background: #eaa845;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .chat-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a8f3d, #0d5c26);
            color: white;
            border-radius: 15px 15px 0 0;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f0f0f0;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user-message {
            background: #2ecc71;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .bot-message {
            background: white;
            color: #333;
            margin-right: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-radius: 0 0 15px 15px;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #2ecc71;
        }

        .send-btn, .voice-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .send-btn:hover, .voice-btn:hover {
            background: #27ae60;
        }

        .voice-btn {
            background: #3498db;
        }

        .voice-btn:hover {
            background: #2980b9;
        }

        .typing-indicator span {
            animation: blink 1.4s infinite both;
            display: inline-block;
            font-size: 20px;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="chatbot-wrapper">
        <div class="back-button-container">
            <button class="back-to-home" onclick="goBackToHome()">
                <i class="fas fa-arrow-left"></i>
                <span id="backBtnText">Back to Home</span>
            </button>
        </div>

        <div class="chatbot-container">
            <div id="languageModal" class="modal">
                <div class="modal-content">
                    <h2 id="modalTitle">Select Your Language</h2>
                    <div class="language-options">
                        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
                        <button class="lang-btn" data-lang="hi">🇮🇳 हिंदी</button>
                        <button class="lang-btn" data-lang="mr">🇮🇳 मराठी</button>
                        <button class="lang-btn" data-lang="te">🇮🇳 తెలుగు</button>
                        <button class="lang-btn" data-lang="ta">🇮🇳 தமிழ்</button>
                        <button class="lang-btn" data-lang="kn">🇮🇳 ಕನ್ನಡ</button>
                    </div>
                </div>
            </div>

            <div class="chat-interface">
                <div class="chat-header">
                    <h2 id="headerTitle">🤖 AgriBot</h2>
                    <p id="headerSubtitle">Your Smart Farming Assistant - Ask me anything about farming!</p>
                    <button id="changeLanguageBtn" class="lang-change-btn">🌐 <span id="changeLangText">Change Language</span></button>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot-message" id="welcomeMessage">
                        Welcome! I'm AgriBot. Ask me anything about farming, crops, diseases, prices, or agricultural practices.
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <div class="voice-controls">
                        <button id="voiceInputBtn" class="voice-btn">🎤</button>
                        <span id="voiceStatus"></span>
                    </div>
                    <input type="text" id="userInput" placeholder="Type your question here..." class="chat-input">
                    <button id="sendBtn" class="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/agribot-api.js"></script>
    <script>
        function goBackToHome() {
            window.location.href = 'home.html';
        }

        let currentLanguage = localStorage.getItem('agribot_language') || 'en';
        let recognition = null;
        let isListening = false;

        // Complete UI translations for ALL text
        const translations = {
            en: {
                backButton: "Back to Home",
                modalTitle: "Select Your Language",
                headerTitle: "🤖 AgriBot",
                headerSubtitle: "Your Smart Farming Assistant - Ask me anything about farming!",
                changeLangText: "Change Language",
                welcomeMessage: "Welcome! I'm AgriBot. Ask me anything about farming, crops, diseases, prices, or agricultural practices.",
                placeholder: "Type your question here...",
                sendButton: "Send",
                listening: "Listening...",
                errorMessage: "Sorry, I encountered an error. Please try again."
            },
            hi: {
                backButton: "होम पर वापस जाएं",
                modalTitle: "अपनी भाषा चुनें",
                headerTitle: "🤖 एग्रीबॉट",
                headerSubtitle: "आपका स्मार्ट कृषि सहायक - कृषि के बारे में कुछ भी पूछें!",
                changeLangText: "भाषा बदलें",
                welcomeMessage: "स्वागत है! मैं एग्रीबॉट हूँ। मुझसे फसलों, बीमारियों, कीमतों या कृषि पद्धतियों के बारे में कुछ भी पूछें।",
                placeholder: "अपना प्रश्न यहाँ टाइप करें...",
                sendButton: "भेजें",
                listening: "सुन रहा हूँ...",
                errorMessage: "क्षमा करें, मुझे एक त्रुटि हुई। कृपया पुनः प्रयास करें।"
            },
            mr: {
                backButton: "मुख्यपृष्ठावर परत",
                modalTitle: "तुमची भाषा निवडा",
                headerTitle: "🤖 अग्रीबॉट",
                headerSubtitle: "तुमचा स्मार्ट शेती सहाय्यक - शेतीबद्दल काहीही विचारा!",
                changeLangText: "भाषा बदला",
                welcomeMessage: "स्वागत आहे! मी अग्रीबॉट आहे. मला पिके, रोग, किंमती किंवा शेती पद्धतींबद्दल काहीही विचारा.",
                placeholder: "तुमचा प्रश्न येथे टाइप करा...",
                sendButton: "पाठवा",
                listening: "ऐकत आहे...",
                errorMessage: "क्षमस्व, मला त्रुटी आली. कृपया पुन्हा प्रयत्न करा."
            },
            te: {
                backButton: "హోమ్కు తిరిగి వెళ్ళు",
                modalTitle: "మీ భాషను ఎంచుకోండి",
                headerTitle: "🤖 అగ్రిబోట్",
                headerSubtitle: "మీ స్మార్ట్ వ్యవసాయ సహాయకుడు - వ్యవసాయం గురించి ఏదైనా అడగండి!",
                changeLangText: "భాష మార్చు",
                welcomeMessage: "స్వాగతం! నేను అగ్రిబోట్ ను. పంటలు, వ్యాధులు, ధరలు లేదా వ్యవసాయ పద్ధతుల గురించి ఏదైనా అడగండి.",
                placeholder: "మీ ప్రశ్నను ఇక్కడ టైప్ చేయండి...",
                sendButton: "పంపండి",
                listening: "వింటున్నాను...",
                errorMessage: "క్షమించండి, ఒక లోపం ఏర్పడింది. దయచేసి మళ్లీ ప్రయత్నించండి."
            },
            ta: {
                backButton: "முகப்புக்குத் திரும்பு",
                modalTitle: "உங்கள் மொழியைத் தேர்ந்தெடுக்கவும்",
                headerTitle: "🤖 அக்ரிபோட்",
                headerSubtitle: "உங்கள் ஸ்மார்ட் விவசாய உதவியாளர் - விவசாயம் பற்றி எதையும் கேளுங்கள்!",
                changeLangText: "மொழியை மாற்று",
                welcomeMessage: "வரவேற்கிறோம்! நான் அக்ரிபோட். பயிர்கள், நோய்கள், விலைகள் அல்லது விவசாய நடைமுறைகள் பற்றி எதையும் கேளுங்கள்.",
                placeholder: "உங்கள் கேள்வியை இங்கே தட்டச்சு செய்க...",
                sendButton: "அனுப்பு",
                listening: "கேட்கிறேன்...",
                errorMessage: "மன்னிக்கவும், பிழை ஏற்பட்டது. தயவுசெய்து மீண்டும் முயற்சிக்கவும்."
            },
            kn: {
                backButton: "ಮುಖಪುಟಕ್ಕೆ ಹಿಂತಿರುಗಿ",
                modalTitle: "ನಿಮ್ಮ ಭಾಷೆಯನ್ನು ಆಯ್ಕೆಮಾಡಿ",
                headerTitle: "🤖 ಅಗ್ರಿಬಾಟ್",
                headerSubtitle: "ನಿಮ್ಮ ಸ್ಮಾರ್ಟ್ ಕೃಷಿ ಸಹಾಯಕ - ಕೃಷಿ ಬಗ್ಗೆ ಏನು ಬೇಕಾದರೂ ಕೇಳಿ!",
                changeLangText: "ಭಾಷೆ ಬದಲಾಯಿಸಿ",
                welcomeMessage: "ಸ್ವಾಗತ! ನಾನು ಅಗ್ರಿಬಾಟ್. ಬೆಳೆಗಳು, ರೋಗಗಳು, ಬೆಲೆಗಳು ಅಥವಾ ಕೃಷಿ ಪದ್ಧತಿಗಳ ಬಗ್ಗೆ ಏನು ಬೇಕಾದರೂ ಕೇಳಿ.",
                placeholder: "ನಿಮ್ಮ ಪ್ರಶ್ನೆಯನ್ನು ಇಲ್ಲಿ ಟೈಪ್ ಮಾಡಿ...",
                sendButton: "ಕಳುಹಿಸು",
                listening: "ಆಲಿಸುತ್ತಿದ್ದೇನೆ...",
                errorMessage: "ಕ್ಷಮಿಸಿ, ದೋಷ ಕಂಡುಬಂದಿದೆ. ದಯವಿಟ್ಟು ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ."
            }
        };

        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                
                const langMap = { 'en': 'en-US', 'hi': 'hi-IN', 'mr': 'mr-IN', 'te': 'te-IN', 'ta': 'ta-IN', 'kn': 'kn-IN' };
                recognition.lang = langMap[currentLanguage] || 'en-US';
                
                recognition.onstart = () => {
                    isListening = true;
                    const statusSpan = document.getElementById('voiceStatus');
                    if (statusSpan) {
                        statusSpan.textContent = translations[currentLanguage].listening;
                        statusSpan.style.color = '#2ecc71';
                    }
                };
                
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('userInput').value = transcript;
                    sendMessage();
                };
                
                recognition.onerror = (event) => {
                    console.error('Speech error:', event.error);
                    const statusSpan = document.getElementById('voiceStatus');
                    if (statusSpan) {
                        statusSpan.textContent = 'Error: ' + event.error;
                        statusSpan.style.color = 'red';
                        setTimeout(() => { statusSpan.textContent = ''; }, 2000);
                    }
                    isListening = false;
                };
                
                recognition.onend = () => {
                    isListening = false;
                    const statusSpan = document.getElementById('voiceStatus');
                    if (statusSpan && statusSpan.textContent === translations[currentLanguage].listening) {
                        setTimeout(() => { statusSpan.textContent = ''; }, 1000);
                    }
                };
            } else {
                alert('Speech recognition not supported in this browser');
                const voiceBtn = document.getElementById('voiceInputBtn');
                if (voiceBtn) voiceBtn.style.display = 'none';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            showTypingIndicator();
            
            try {
                // Pass the language to backend for Telugu responses!
                const response = await agriBotAPI.getResponse(message, currentLanguage);
                removeTypingIndicator();
                addMessage(response, 'bot');
                scrollToBottom();
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessage(translations[currentLanguage].errorMessage, 'bot');
            }
        }

        function addMessage(text, type) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            messageDiv.innerHTML = text;
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message typing-indicator';
            typingDiv.innerHTML = '<span>.</span><span>.</span><span>.</span>';
            typingDiv.id = 'typingIndicator';
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            const messagesDiv = document.getElementById('chatMessages');
            if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function startVoiceInput() {
            if (!recognition) initSpeechRecognition();
            if (recognition && !isListening) {
                const langMap = { 'en': 'en-US', 'hi': 'hi-IN', 'mr': 'mr-IN', 'te': 'te-IN', 'ta': 'ta-IN', 'kn': 'kn-IN' };
                recognition.lang = langMap[currentLanguage] || 'en-US';
                recognition.start();
            }
        }

        function changeLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('agribot_language', lang);
            
            // Update ALL UI text elements
            document.getElementById('backBtnText').innerText = translations[lang].backButton;
            document.getElementById('modalTitle').innerText = translations[lang].modalTitle;
            document.getElementById('headerTitle').innerHTML = translations[lang].headerTitle;
            document.getElementById('headerSubtitle').innerText = translations[lang].headerSubtitle;
            document.getElementById('changeLangText').innerText = translations[lang].changeLangText;
            document.getElementById('welcomeMessage').innerHTML = translations[lang].welcomeMessage;
            document.getElementById('userInput').placeholder = translations[lang].placeholder;
            document.getElementById('sendBtn').innerHTML = translations[lang].sendButton;
            
            // Clear chat history when changing language
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = '';
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message bot-message';
            welcomeDiv.id = 'welcomeMessage';
            welcomeDiv.innerHTML = translations[lang].welcomeMessage;
            messagesDiv.appendChild(welcomeDiv);
            
            document.getElementById('languageModal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', function() {
            initSpeechRecognition();
            
            // Check if language is selected, if not show modal
            if (!localStorage.getItem('agribot_language')) {
                document.getElementById('languageModal').style.display = 'block';
            } else {
                changeLanguage(currentLanguage);
            }
            
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
            document.getElementById('voiceInputBtn').addEventListener('click', startVoiceInput);
            document.getElementById('changeLanguageBtn').addEventListener('click', () => { 
                document.getElementById('languageModal').style.display = 'block'; 
            });
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => changeLanguage(btn.getAttribute('data-lang')));
            });
            
            window.onclick = (event) => {
                const modal = document.getElementById('languageModal');
                if (event.target == modal) modal.style.display = 'none';
            };
        });
    </script>
</body>
</html>
